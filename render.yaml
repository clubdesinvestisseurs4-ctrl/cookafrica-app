services:
  - type: web
    name: cookafrica-api
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install && npm test
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
